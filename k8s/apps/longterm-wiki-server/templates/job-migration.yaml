{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wiki-server.name" . }}-migration-{{ .Release.Revision }}
  labels:
    app: {{ include "wiki-server.name" . }}
    component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  activeDeadlineSeconds: 300
  backoffLimit: {{ .Values.migration.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        app: {{ include "wiki-server.name" . }}
        component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command: ["pnpm", "run", "db:migrate"]
          envFrom:
            - secretRef:
                name: {{ .Values.envSecret }}
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
{{- end }}
