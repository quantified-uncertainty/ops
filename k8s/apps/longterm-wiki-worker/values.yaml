replicaCount: 3

image:
  name: ghcr.io/quantified-uncertainty/longterm-wiki-worker
  tag: "main"

envSecret: longtermwiki-worker-env

command:
  - node
  - --import
  - tsx/esm
  - crux/worker/run.ts
  - --poll
  - --poll-interval=5000
  - --types=claim-sourcing,citation-verify,resource-verify,resource-enrich,resource-ingest,ping,backfill-sources
  - --concurrency=5
  - --verbose

healthPort: 3101

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
