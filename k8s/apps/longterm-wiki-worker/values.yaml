replicaCount: 3

image:
  name: ghcr.io/quantified-uncertainty/longterm-wiki-worker
  tag: "main"

envSecret: longtermwiki-worker-env

command:
  - node
  - --import
  - tsx/esm
  - crux/worker/run.ts
  - --poll
  - --poll-interval=5000
  - --types=claim-sourcing,citation-verify,resource-verify,resource-enrich,resource-ingest,ping,backfill-sources
  - --concurrency=5
  - --verbose

healthPort: 3101

# Raise V8 heap to 2GB. The default (~512MB) OOMs the backfill-sources child on
# large batches ("JavaScript heap out of memory"). The child inherits NODE_OPTIONS
# from the worker container. Kept below resources.limits.memory so off-heap
# allocations + buffers still fit. Worker nodes are 4GB, so we don't go higher.
nodeOptions: "--max-old-space-size=2048"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2560Mi"
    cpu: "1000m"
